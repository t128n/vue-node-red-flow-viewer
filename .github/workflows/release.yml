name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'packages/vue-node-red-flow-viewer/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate changelog and bump version
        working-directory: packages/vue-node-red-flow-viewer
        run: pnpm run changelog:bump

      - name: Check if version was bumped
        id: check_bump
        run: |
          # Ensure we have the remote main to compare against
          git fetch origin main --quiet || true
          # If package.json in the package changed vs origin/main, consider it bumped
          if git diff --name-only origin/main...HEAD | grep -q "packages/vue-node-red-flow-viewer/package.json"; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes and tag
        if: steps.check_bump.outputs.bumped == 'true'
        run: |
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.check_bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/vue-node-red-flow-viewer
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v$VERSION" --title "v$VERSION" --notes-file CHANGELOG.md --latest

      - name: Verify
        if: steps.check_bump.outputs.bumped == 'true'
        run: pnpm run ci

      - name: Publish package
        if: steps.check_bump.outputs.bumped == 'true'
        run: pnpm publish --provenance --access public
        working-directory: packages/vue-node-red-flow-viewer
