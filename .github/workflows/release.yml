name: release

on:
  workflow_run:
    workflows: ['ci']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.actor != 'github-actions[bot]')
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get pre-bump version
        id: pre_bump
        working-directory: packages/vue-node-red-flow-viewer
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Release, Commit, Tag, and Push
        working-directory: packages/vue-node-red-flow-viewer
        # Using npx ensures we access the CLI flags without modifying your existing package.json scripts
        run: pnpm exec changelogen --release --push

      - name: Get post-bump version
        id: post_bump
        working-directory: packages/vue-node-red-flow-viewer
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.pre_bump.outputs.version != steps.post_bump.outputs.version
        working-directory: packages/vue-node-red-flow-viewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec changelogen gh release --token ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        if: steps.pre_bump.outputs.version != steps.post_bump.outputs.version
        working-directory: packages/vue-node-red-flow-viewer
        run: npm publish
