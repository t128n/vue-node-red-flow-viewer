name: Documentation
description: Report missing, confusing, or outdated documentation.
title: '[Docs]: '
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which page, section, README heading, or example is affected?
      placeholder: README Usage section, docs example page, API reference, etc.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Describe what is missing, confusing, incorrect, or outdated.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or example
      description: Optional, but very helpful if you already know what would make the docs clearer.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link related issues, screenshots, or examples.
